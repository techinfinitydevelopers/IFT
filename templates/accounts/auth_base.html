{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IFT{% endblock %}</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Remix Icons -->
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <!-- Iconify -->
    <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>

    <!-- Auth CSS -->
    <link rel="stylesheet" href="{% static 'css/auth.css' %}">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <div class="auth-container">
        <!-- Left Side -->
        <div class="auth-left">
            {% block left_image %}
            <img src="{% static 'images/auth/form-image.png' %}" alt="Authentication illustration">
            {% endblock %}
        </div>

        <!-- Right Side -->
        <div class="auth-right">
            <div class="form-container">
                <!-- Logo -->
                <a href="/">
                    <img src="{% static 'images/IFT_logo.png' %}" alt="IFT Logo" class="logo">
                </a>

                <!-- Messages -->
                {% if messages %}
                    {% for message in messages %}
                        <div class="alert-{{ message.tags }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}

                {% block content %}{% endblock %}
            </div>
        </div>
    </div>

    <!-- jQuery -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        // Password Toggle
        $('.toggle-password').on('click', function() {
            const target = $(this).data('target');
            const input = $('#' + target);
            if (input.attr('type') === 'password') {
                input.attr('type', 'text');
                $(this).removeClass('ri-eye-line').addClass('ri-eye-off-line');
            } else {
                input.attr('type', 'password');
                $(this).removeClass('ri-eye-off-line').addClass('ri-eye-line');
            }
        });
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
