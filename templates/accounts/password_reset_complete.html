{% extends "accounts/auth_base.html" %}

{% block title %}Password Reset Complete - IFT{% endblock %}

{% block content %}
<div class="text-center">
    <div class="modal-icon">
        <iconify-icon icon="line-md:confirm-circle-twotone"></iconify-icon>
    </div>
    <h1>Password Reset Successful!</h1>
    <p class="subtitle">Your password has been reset successfully. You can now sign in with your new password.</p>
    <a href="{% url 'accounts:sign_in' %}" class="btn-primary" style="display: block; line-height: 56px; text-decoration: none;">
        Sign In
    </a>
</div>
{% endblock %}
