{% extends 'base.html' %}

{% block title %}Login - IFT Platform{% endblock %}

{% block content %}
<div class="container" style="display: flex; align-items: center; justify-content: center; min-height: 80vh;">
    <div style="width: 100%; max-width: 400px;">
        <div class="card" style="padding: 2rem;">
            <div style="text-align: center; margin-bottom: 2rem;">
                <div style="font-size: 3rem; margin-bottom: 1rem;">🔐</div>
                <h2>Welcome Back</h2>
                <p>Login to your account to continue</p>
            </div>

            <form method="post">
                {% csrf_token %}

                <div class="form-group">
                    <label class="form-label">Username</label>
                    <input type="text" name="username" class="form-control" placeholder="Enter your username" required>
                </div>

                <div class="form-group" style="margin-bottom: 2rem;">
                    <label class="form-label">Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password"
                        required>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.8rem;">Sign In</button>
            </form>

            <div
                style="text-align: center; margin-top: 1.5rem; padding-top: 1.5rem; border-top: 1px solid var(--border-subtle);">
                <p style="margin-bottom: 0.5rem; font-size: 0.9rem;">Don't have an account?</p>
                <a href="{% url 'students:register' %}" style="font-weight: 600;">Create Student Account</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
